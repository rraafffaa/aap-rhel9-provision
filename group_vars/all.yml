---
# ── Azure Infrastructure Settings ──────────────────────────────────────
azure_resource_group: "rafeal-rg"
azure_location: "eastus"

# Networking
azure_vnet_name: "aap-vnet"
azure_vnet_cidr: "10.10.0.0/16"
azure_subnet_name: "aap-subnet"
azure_subnet_cidr: "10.10.1.0/24"
azure_nsg_name: "aap-nsg"
azure_public_ip_name: "aap-controller-pip"

# VM Configuration
azure_vm_name: "aap-controller"
azure_vm_size: "Standard_D4s_v5"  # 4 vCPU, 16 GB RAM — minimum for AAP
azure_vm_admin_user: "azureuser"
azure_vm_os_disk_size_gb: 100
azure_nic_name: "aap-controller-nic"

# RHEL 9 Image (Red Hat official marketplace image)
azure_vm_image:
  publisher: "RedHat"
  offer: "RHEL"
  sku: "9-lvm-gen2"
  version: "latest"

# ── AAP Installation Settings ──────────────────────────────────────────
# AAP 2.5 containerized installer
aap_version: "2.5"
aap_admin_user: "admin"
# These should be stored as AAP credentials or vault-encrypted in production
# aap_admin_password: "{{ vault_aap_admin_password }}"
# rhsm_username: "{{ vault_rhsm_username }}"
# rhsm_password: "{{ vault_rhsm_password }}"
# rhsm_pool_id: "{{ vault_rhsm_pool_id }}"

# AAP component toggles
aap_install_controller: true
aap_install_hub: true
aap_install_eda: false

# PostgreSQL (bundled)
aap_pg_password: "{{ vault_aap_pg_password | default('R3dH4t!AutoPlatform') }}"
